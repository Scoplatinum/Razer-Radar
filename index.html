<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="个人定制的升学、研究与求职每日更新"><title>聚焦 · Focus</title><link rel="stylesheet" href="styles.css"></head><body>
<div class="shell"><aside><div><p class="eyebrow">SELECTED NOTES</p><h1>聚焦</h1><p class="en">Focus</p></div><nav id="nav"></nav><section class="private"><span class="dot"></span><span id="save-status">私人状态保存在浏览器</span><div><button id="export">导出备份</button><label>载入文件<input id="import" type="file" accept="application/json"></label></div></section></aside>
<main><header><div><p id="today"></p><h2>本期聚焦</h2></div><div id="updated"></div></header>
<section class="summary"><div><b>本期说明</b><p>按你的关注主题筛选并核验更新。公开信息来自自动来源与人工精选；收藏、申请状态和私人备注不会上传 GitHub。</p></div><dl><div><dt>本期新增</dt><dd id="total">0</dd></div><div class="urgent"><dt>需尽快行动</dt><dd id="urgent">0</dd></div><div><dt>来源待核验</dt><dd id="verify">0</dd></div></dl></section>
<section class="toolbar"><div id="tabs"></div><label><span>搜索</span><input id="search" placeholder="标题、机构、地区或关键词"></label></section>
<section class="heading"><div><p>TODAY'S UPDATE</p><h3 id="view-title">今日更新内容</h3></div><span id="count"></span></section><section id="feed" class="feed"></section><footer>公开更新保存在 GitHub；个人状态仅保存在当前浏览器或你主动导出的本地文件。</footer></main></div>
<script type="module" src="app.js"></script></body></html>
